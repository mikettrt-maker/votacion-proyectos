<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Votación</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="stylesheet" href="estilos.css?v=2">
<style>
  .btn-reset { background: #7c3aed; color: #fff; border: none; padding: 1.2rem 2rem; border-radius: 12px; font-size: 1.2rem; font-weight: 700; cursor: pointer; transition: all 0.2s; width: 100%; }
  .btn-reset:hover { background: #6d28d9; }
  .mensaje { margin-top: 1.2rem; padding: 1rem; border-radius: 10px; font-weight: 600; display: none; font-size: 1rem; }
  .mensaje.ok { display: block; background: #2d1054; color: #c084fc; border: 1px solid #6d28d9; }
  .mensaje.error { display: block; background: #2d1010; color: #f87171; border: 1px solid #5c2020; }
  .cuidado { color: #f87171; font-size: 0.9rem; margin-top: 1.2rem; }
</style>
</head>
<body class="admin-body">
<div class="admin-card">
  <h1>⚙️ Panel Admin</h1>
  <p>Reinicia todos los votos a cero para empezar una nueva ronda.</p>
  <button id="btn-reset" class="btn-reset" onclick="resetearVotos()">🗑️ REINICIAR TODOS LOS VOTOS</button>
  <div id="mensaje" class="mensaje"></div>
  <div class="cuidado">⚠️ Esta acción no se puede deshacer</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script>
async function resetearVotos() {
  if (!confirm('¿Estás SEGURO de reiniciar todos los votos a cero?')) return
  if (!confirm('⚠️ ¡ÚLTIMA ADVERTENCIA! Todos los votos se perderán ¿Continuar?')) return

  const btn = document.getElementById('btn-reset')
  const msg = document.getElementById('mensaje')
  btn.disabled = true
  btn.textContent = 'Reiniciando...'
  msg.className = 'mensaje'
  msg.style.display = 'none'

  try {
    const { error } = await window._db
      .from('proyectos')
      .update({
        ingenio: 0, estetica: 0, funcion: 0,
        votos_ingenio: 0, votos_estetica: 0, votos_funcion: 0
      })
      .neq('id', 'none')

    if (error) throw error

    msg.className = 'mensaje ok'
    msg.textContent = '✅ ¡Todos los votos han sido reiniciados!'
    msg.style.display = 'block'
  } catch (err) {
    console.error(err)
    msg.className = 'mensaje error'
    msg.textContent = '❌ Error: ' + err.message
    msg.style.display = 'block'
  }

  btn.disabled = false
  btn.textContent = '🗑️ REINICIAR TODOS LOS VOTOS'
}
</script>
</body>
</html>
