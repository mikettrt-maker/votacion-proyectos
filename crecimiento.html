<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crecimiento de Votación</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="stylesheet" href="estilos.css?v=5">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  body { background: #080012; color: #e2d9f3; }
  .growth-container { max-width: 1400px; margin: 0 auto; padding: 1rem; }
  .growth-header { text-align: center; padding: 1rem 0; }
  .growth-header h1 { font-size: 2.5rem; color: #a855f7; letter-spacing: 2px; }
  .growth-header .grado-tabs { display: flex; justify-content: center; gap: 0.8rem; margin: 1rem 0; }
  .growth-header .grado-tab { background: #1a0a2e; border: 2px solid #3b1f6e; color: #9ca3af; padding: 0.5rem 1.5rem; border-radius: 10px; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: all 0.2s; }
  .growth-header .grado-tab.active { background: #7c3aed; border-color: #7c3aed; color: #fff; }
  .growth-header .grado-tab:hover { border-color: #a855f7; }
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.2rem; margin-top: 1rem; }
  .chart-card { background: #140826; border: 1px solid #3b1f6e; border-radius: 16px; padding: 1.2rem; box-shadow: 0 0 20px rgba(124,58,237,0.15); transition: box-shadow 0.3s; }
  .chart-card:hover { box-shadow: 0 0 30px rgba(124,58,237,0.3); }
  .chart-card h3 { color: #fff; text-align: center; margin-bottom: 0.8rem; font-size: 1.2rem; text-shadow: 0 0 10px currentColor; }
  .chart-card canvas { max-height: 350px; width: 100% !important; }
  .live-badge { display: inline-block; background: linear-gradient(135deg,#7c3aed,#a855f7); color: #fff; padding: 0.35rem 1rem; border-radius: 14px; font-size: 0.9rem; font-weight: 700; animation: pulse 1.5s infinite; box-shadow: 0 0 15px rgba(168,85,247,0.4); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
  .footer-info { text-align: center; padding: 1rem; color: #6b4b8a; font-size: 0.85rem; }
  @media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="growth-container">
  <div class="growth-header">
    <h1>📈 CRECIMIENTO DE VOTACIÓN</h1>
    <div><span class="live-badge">🔴 EN VIVO</span></div>
    <div class="grado-tabs">
      <button class="grado-tab" data-grado="4°" onclick="selGrado('4°')">4° Grado</button>
      <button class="grado-tab active" data-grado="5°" onclick="selGrado('5°')">5° Grado</button>
      <button class="grado-tab" data-grado="6°" onclick="selGrado('6°')">6° Grado</button>
    </div>
  </div>

  <div class="charts-grid">
    <div class="chart-card">
      <h3>💡 Ingenioso</h3>
      <canvas id="c1"></canvas>
    </div>
    <div class="chart-card">
      <h3>🎨 Estética</h3>
      <canvas id="c2"></canvas>
    </div>
    <div class="chart-card">
      <h3>⚙️ Funcionamiento</h3>
      <canvas id="c3"></canvas>
    </div>
  </div>

  <div style="text-align:center;margin:1rem 0;padding:1rem;border-top:1px solid #3b1f6e;">
    <button onclick="resetVotos()" class="reset-btn">🗑️ REINICIAR VOTOS</button>
  </div>
  <div class="footer-info">Los datos se actualizan automáticamente</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<style>
.reset-btn { background:#5c2020; color:#f87171; border:1px solid #f87171; padding:0.8rem 2rem; border-radius:10px; font-size:1rem; font-weight:700; cursor:pointer; transition:all 0.2s; }
.reset-btn:hover { background:#7c2a2a; box-shadow:0 0 15px rgba(248,113,113,0.3); }
</style>
<script>
// ===== CRECIMIENTO.JS =====
let g = '5°', ch1 = null, ch2 = null, ch3 = null
let ChartLib = typeof Chart !== 'undefined' ? Chart : null

async function loadData() {
  try {
    const { data: p } = await window._db.from('proyectos').select('*')
    if (p) render(p)
  } catch(e) { console.error(e) }
}

function render(proyectos) {
  const filt = proyectos.filter(x => x.grado === g)
  if (!ChartLib) return
  grafica('c1', filt, 'ingenio', '💡', '#c084fc')
  grafica('c2', filt, 'estetica', '🎨', '#a78bfa')
  grafica('c3', filt, 'funcion', '⚙️', '#f1c40f')
}

function grafica(canvasId, datos, campo, icono, color) {
  const ctx = document.getElementById(canvasId).getContext('2d')
  let ch = canvasId === 'c1' ? ch1 : canvasId === 'c2' ? ch2 : ch3
  if (ch) ch.destroy()

  const ordenados = [...datos].sort((a, b) => b[campo] - a[campo])
  const labels = ordenados.map(x => x.nombre)
  const valores = ordenados.map(x => x[campo])

  if (valores.length === 0) { valores.push(0); labels.push('Sin datos') }

  const grad = ctx.createLinearGradient(0, 0, 0, 350)
  grad.addColorStop(0, color)
  grad.addColorStop(1, color + '22')

  const maxVal = Math.max(...valores, 1)
  const step = maxVal <= 3 ? 1 : maxVal <= 10 ? 2 : 5

  const nueva = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: valores,
        backgroundColor: grad,
        borderColor: color,
        borderWidth: 2,
        borderRadius: 6,
        borderSkipped: false,
        hoverBackgroundColor: color
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a0a2e',
          titleColor: '#e2d9f3',
          bodyColor: '#fff',
          borderColor: color,
          borderWidth: 2,
          padding: 10,
          callbacks: {
            label: ctx => '⭐ ' + ctx.parsed.y
          }
        },
        datalabels: { display: false }
      },
      scales: {
        x: {
          ticks: { color: '#e2d9f3', font: { size: 11, weight: 'bold' }, maxRotation: 50 },
          grid: { display: false }
        },
        y: {
          beginAtZero: true,
          max: Math.ceil(maxVal / step) * step + step,
          ticks: { color: 'rgba(226,217,243,0.6)', stepSize: step, font: { size: 10 } },
          grid: { color: 'rgba(59,31,110,0.4)' }
        }
      },
      animation: { duration: 600, easing: 'easeOutQuart' }
    },
    plugins: [{
      id: 'glow',
      beforeDraw: (chart) => {
        const ctx2 = chart.ctx
        chart.data.datasets.forEach((ds, i) => {
          const meta = chart.getDatasetMeta(i)
          meta.data.forEach(bar => {
            ctx2.save()
            ctx2.shadowColor = color
            ctx2.shadowBlur = 12
            ctx2.restore()
          })
        })
      },
      afterDraw: (chart) => {
        const ctx2 = chart.ctx
        chart.data.datasets.forEach((ds, i) => {
          const meta = chart.getDatasetMeta(i)
          meta.data.forEach((bar, j) => {
            const val = ds.data[j]
            if (val > 0) {
              ctx2.fillStyle = '#fff'
              ctx2.font = 'bold 11px sans-serif'
              ctx2.textAlign = 'center'
              ctx2.shadowColor = color
              ctx2.shadowBlur = 8
              ctx2.fillText(val, bar.x, bar.y - 8)
            }
          })
        })
      }
    }]
  })

  if (canvasId === 'c1') ch1 = nueva
  else if (canvasId === 'c2') ch2 = nueva
  else ch3 = nueva
}

function selGrado(grado) { g = grado; document.querySelectorAll('.grado-tab').forEach(t => t.classList.toggle('active', t.dataset.grado === g)); loadData() }

async function resetVotos() {
  if (!confirm('¿Reiniciar TODOS los votos?')) return
  if (!confirm('¿SEGURO?')) return
  try {
    await window._db.from('proyectos').update({ ingenio:0, estetica:0, funcion:0, votos_ingenio:0, votos_estetica:0, votos_funcion:0 }).neq('id', 'none')
    alert('✅ Reiniciado')
    loadData()
  } catch(e) { alert('Error: '+e.message) }
}

// Iniciar
if (window._db && ChartLib) loadData()

// Suscripcion en tiempo real
try {
  window._db.channel('cambios-proyectos-growth')
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'proyectos' }, () => loadData())
    .subscribe()
} catch(e) {}
</script>
</body>
</html>
