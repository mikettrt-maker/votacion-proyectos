<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crecimiento de Votación</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="stylesheet" href="estilos.css?v=5">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  body { background: #080012; color: #e2d9f3; }
  .growth-container { max-width: 1400px; margin: 0 auto; padding: 1rem; }
  .growth-header { text-align: center; padding: 1rem 0; }
  .growth-header h1 { font-size: 2.5rem; color: #a855f7; letter-spacing: 2px; }
  .growth-header .grado-tabs { display: flex; justify-content: center; gap: 0.8rem; margin: 1rem 0; }
  .growth-header .grado-tab { background: #1a0a2e; border: 2px solid #3b1f6e; color: #9ca3af; padding: 0.5rem 1.5rem; border-radius: 10px; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: all 0.2s; }
  .growth-header .grado-tab.active { background: #7c3aed; border-color: #7c3aed; color: #fff; }
  .growth-header .grado-tab:hover { border-color: #a855f7; }
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.2rem; margin-top: 1rem; }
  .chart-card { background: #140826; border: 1px solid #3b1f6e; border-radius: 16px; padding: 1.2rem; }
  .chart-card h3 { color: #c084fc; text-align: center; margin-bottom: 0.8rem; font-size: 1.1rem; }
  .chart-card canvas { max-height: 300px; width: 100% !important; }
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1rem; }
  .stat-box { background: #1a0a2e; border: 1px solid #3b1f6e; border-radius: 12px; padding: 1rem; text-align: center; }
  .stat-box .num { font-size: 2rem; font-weight: 800; color: #f1c40f; display: block; }
  .stat-box .label { font-size: 0.8rem; color: #9ca3af; text-transform: uppercase; letter-spacing: 1px; }
  .live-badge { display: inline-block; background: #7c3aed; color: #fff; padding: 0.35rem 1rem; border-radius: 14px; font-size: 0.9rem; font-weight: 700; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
  .footer-info { text-align: center; padding: 1rem; color: #6b4b8a; font-size: 0.85rem; }
  .debug-box { background: #1a0a0a; border: 1px solid #5c2020; color: #f87171; padding: 1rem; border-radius: 10px; margin: 1rem 0; display: none; font-size: 0.85rem; }
  @media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 600px) { .charts-grid { grid-template-columns: 1fr; } .stats-row { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<div class="growth-container">
  <div class="growth-header">
    <h1>📈 CRECIMIENTO DE VOTACIÓN</h1>
    <div><span class="live-badge">🔴 EN VIVO</span></div>
    <div class="grado-tabs">
      <button class="grado-tab" data-grado="4°" onclick="selGrado('4°')">4° Grado</button>
      <button class="grado-tab active" data-grado="5°" onclick="selGrado('5°')">5° Grado</button>
      <button class="grado-tab" data-grado="6°" onclick="selGrado('6°')">6° Grado</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-box"><span class="num" id="s-votos">0</span><div class="label">Votos Emitidos</div></div>
    <div class="stat-box"><span class="num" id="s-estrellas">0</span><div class="label">Estrellas Totales</div></div>
    <div class="stat-box"><span class="num" id="s-proyectos">0</span><div class="label">Proyectos</div></div>
    <div class="stat-box"><span class="num" id="s-promedio">0.0</span><div class="label">Promedio x Voto</div></div>
  </div>

  <div id="debug" class="debug-box"></div>

  <div class="charts-grid">
    <div class="chart-card">
      <h3>💡 Ingenioso</h3>
      <canvas id="c1"></canvas>
    </div>
    <div class="chart-card">
      <h3>🎨 Estética</h3>
      <canvas id="c2"></canvas>
    </div>
    <div class="chart-card">
      <h3>⚙️ Funcionamiento</h3>
      <canvas id="c3"></canvas>
    </div>
  </div>

  <div style="text-align:center;margin:1rem 0;padding:1rem;border-top:1px solid #3b1f6e;">
    <button onclick="resetVotos()" style="background:#5c2020;color:#f87171;border:1px solid #f87171;padding:0.8rem 2rem;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;">🗑️ REINICIAR VOTOS</button>
  </div>
  <div class="footer-info">Los datos se actualizan automáticamente</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script>
// ===== CRECIMIENTO.JS =====
let g = '5°', ch1 = null, ch2 = null, ch3 = null
let ChartLib = typeof Chart !== 'undefined' ? Chart : null

function dbg(msg) { const d = document.getElementById('debug'); if(d) { d.style.display='block'; d.innerHTML += '<div>'+msg+'</div>'; console.log(msg) } }

async function loadData() {
  dbg('Cargando datos...')
  try {
    const { data: p, error: e2 } = await window._db.from('proyectos').select('*')
    if (e2) { dbg('Error proyectos: '+e2.message); return }
    dbg('Proyectos: '+ (p||[]).length + ' registros')
    render(p||[])
  } catch(e) { dbg('Error: '+e.message) }
}

function render(proyectos) {
  const filt = proyectos.filter(x => x.grado === g)

  const tv = filt.reduce((s, x) => s + x.votos_ingenio + x.votos_estetica + x.votos_funcion, 0)
  const te = filt.reduce((s, x) => s + x.ingenio + x.estetica + x.funcion, 0)
  const pv = filt.filter(x => x.votos_ingenio + x.votos_estetica + x.votos_funcion > 0).length
  const prom = tv > 0 ? (te/tv).toFixed(1) : '0.0'

  document.getElementById('s-votos').textContent = tv
  document.getElementById('s-estrellas').textContent = te
  document.getElementById('s-proyectos').textContent = pv
  document.getElementById('s-promedio').textContent = prom

  if (!ChartLib) { dbg('Chart.js no disponible'); return }

  grafica('c1', filt, 'ingenio', '💡', '#c084fc')
  grafica('c2', filt, 'estetica', '🎨', '#a78bfa')
  grafica('c3', filt, 'funcion', '⚙️', '#f1c40f')
}

function grafica(canvasId, datos, campo, icono, color) {
  const ctx = document.getElementById(canvasId).getContext('2d')
  let ch = canvasId === 'c1' ? ch1 : canvasId === 'c2' ? ch2 : ch3
  if (ch) ch.destroy()

  const ordenados = [...datos].sort((a, b) => b[campo] - a[campo])
  const labels = ordenados.map(x => x.nombre)
  const valores = ordenados.map(x => x[campo])

  if (valores.length === 0) { valores.push(0); labels.push('Sin datos') }

  const grad = ctx.createLinearGradient(0, 0, 0, 300)
  grad.addColorStop(0, color)
  grad.addColorStop(1, color + '44')

  const nueva = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: icono,
        data: valores,
        backgroundColor: grad,
        borderColor: color,
        borderWidth: 1,
        borderRadius: 4
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ctx.parsed.y + ' estrellas'
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#e2d9f3', font: { size: 10 }, maxRotation: 45 },
          grid: { display: false }
        },
        y: {
          beginAtZero: true,
          ticks: { color: '#9ca3af', stepSize: 1 },
          grid: { color: '#3b1f6e' }
        }
      }
    }
  })

  if (canvasId === 'c1') ch1 = nueva
  else if (canvasId === 'c2') ch2 = nueva
  else ch3 = nueva
}

function selGrado(grado) { g = grado; document.querySelectorAll('.grado-tab').forEach(t => t.classList.toggle('active', t.dataset.grado === g)); loadData() }

async function resetVotos() {
  if (!confirm('¿Reiniciar TODOS los votos?')) return
  if (!confirm('¿SEGURO?')) return
  try {
    await window._db.from('proyectos').update({ ingenio:0, estetica:0, funcion:0, votos_ingenio:0, votos_estetica:0, votos_funcion:0 }).neq('id', 'none')
    alert('✅ Reiniciado')
    loadData()
  } catch(e) { alert('Error: '+e.message) }
}

// Iniciar
if (!window._db) { dbg('ERROR: Supabase no conectado') }
if (!ChartLib) { dbg('Chart.js no se cargó - usando datos sin gráficas') }
loadData()

// Suscripcion en tiempo real
try {
  window._db.channel('cambios-proyectos-growth')
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'proyectos' }, () => loadData())
    .subscribe()
} catch(e) { dbg('Error suscripcion: '+e.message) }
</script>
</body>
</html>
