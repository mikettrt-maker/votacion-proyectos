<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados en Vivo</title>
<link rel="stylesheet" href="estilos.css">
<style>
  body { background: #0d1117; color: #e6edf3; }
  .resultados-container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
  .resultados-header { text-align: center; padding: 1.5rem 0 0.5rem; }
  .resultados-header h1 { font-size: 2.5rem; color: #f0c040; letter-spacing: 2px; }
  .resultados-header p { color: #8b949e; font-size: 0.9rem; margin-top: 0.3rem; }
  .resultados-header .live-badge { display: inline-block; background: #3fb950; color: #fff; padding: 0.2rem 1rem; border-radius: 12px; font-size: 0.8rem; font-weight: 600; margin-top: 0.5rem; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  #categorias-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-top: 1.5rem; }
  .categoria-card { background: #161b22; border: 1px solid #30363d; border-radius: 14px; padding: 1.2rem; }
  .categoria-card h3 { font-size: 1.1rem; text-align: center; margin-bottom: 1rem; }
  .top-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.6rem; margin-bottom: 0.4rem; background: #1c2128; border-radius: 10px; }
  .top-item .medal { font-size: 1.5rem; min-width: 28px; text-align: center; }
  .top-item .info { flex: 1; }
  .top-item .info .name { font-weight: 600; font-size: 0.95rem; }
  .top-item .info .project { font-size: 0.75rem; color: #8b949e; }
  .top-item .avg { font-size: 1.3rem; font-weight: 700; color: #f0c040; }
  #ranking-completo { margin-top: 2rem; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
  .ranking-col h4 { font-size: 0.85rem; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; border-bottom: 1px solid #30363d; padding-bottom: 0.3rem; }
  .ranking-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.25rem 0.5rem; font-size: 0.8rem; }
  .ranking-item .pos { color: #8b949e; min-width: 20px; font-weight: 600; }
  .ranking-item .rname { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ranking-item .ravg { color: #f0c040; font-weight: 600; }
  .footer-info { text-align: center; padding: 1rem; color: #484f58; font-size: 0.75rem; margin-top: 1rem; }
  #ultima-actualizacion { color: #8b949e; }
  @media (max-width: 768px) {
    #categorias-grid, #ranking-completo { grid-template-columns: 1fr; }
  }
</style>
</head>
<body class="resultados-body">
<div class="resultados-container">
  <div class="resultados-header">
    <h1>🏆 RESULTADOS EN VIVO</h1>
    <div><span class="live-badge">🔴 EN VIVO</span></div>
    <p>5° Grado — Actualizado: <span id="ultima-actualizacion">—</span></p>
  </div>
  <div id="categorias-grid"></div>
  <div id="ranking-completo"></div>
  <div class="footer-info">
    Los puntajes se actualizan automáticamente cuando llegan nuevos votos
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script src="resultados.js"></script>
</body>
</html>
