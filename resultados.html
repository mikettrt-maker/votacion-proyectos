<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyecto de Robótica - Resultados</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="stylesheet" href="estilos.css?v=2">
</head>
<body class="resultados-body">
<div class="resultados-container">
  <div class="resultados-header">
    <h1>🏆 Proyecto robótica<br>ciclo escolar ´2025-2026</h1>
    <p>Campo formativo: <strong>"De lo humano y lo comunitario"</strong></p>
    <div><span class="live-badge">🔴 EN VIVO</span></div>
    <p><span id="grado-titulo">5° Grado</span> — Última actualización: <span id="ultima-actualizacion">—</span></p>
  </div>

  <div class="grado-tabs">
    <button class="grado-tab" data-grado="4°" onclick="seleccionarGrado('4°')">4° Grado</button>
    <button class="grado-tab active" data-grado="5°" onclick="seleccionarGrado('5°')">5° Grado</button>
    <button class="grado-tab" data-grado="6°" onclick="seleccionarGrado('6°')">6° Grado</button>
  </div>

  <div id="categorias-grid"></div>
  <div id="ranking-completo"></div>
  <div class="footer-info">
    Los puntajes se actualizan automáticamente cuando llegan nuevos votos
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script src="resultados.js"></script>
</body>
</html>
